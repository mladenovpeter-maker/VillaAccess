version: "3.9"

# ── Villa Access Control — local Docker stack ─────────────────────────────────
#
# Usage:
#   cp .env.docker.example .env.docker
#   # edit .env.docker with real secrets
#   docker compose --env-file .env.docker up --build
#
# Services:
#   postgres  — database (persisted in postgres_data volume)
#   migrate   — one-shot drizzle schema push (runs before backend, then exits)
#   backend   — Express API on port 8080
#   frontend  — nginx serving the React SPA + proxying /api to backend, port 3000
#   ai-worker — Python ANPR/OCR worker (polls cameras via backend, no ports)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       villa_access
      POSTGRES_USER:     villa_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U villa_user -d villa_access"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Schema migration (one-shot, exits 0 on success) ───────────────────────
  # Runs the deterministic SQL migration runner against the production DB.
  # Applies every lib/db/migrations/*.sql file in order; tracks applied ones
  # in the __migrations table; idempotent; non-interactive; prints real
  # Postgres errors to stderr (no pnpm wrapper to swallow them).
  #
  # Uses the builder stage because it has the full monorepo + node_modules
  # (notably lib/db/node_modules/pg). Working dir is /workspace/lib/db so
  # Node resolves `pg` from lib/db's own node_modules.
  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: builder
    working_dir: /workspace/lib/db
    command: ["node", "./migrate.mjs"]
    environment:
      DATABASE_URL: postgresql://villa_user:${POSTGRES_PASSWORD}@postgres:5432/villa_access
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API server ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT:                 "8080"
      DATABASE_URL:         postgresql://villa_user:${POSTGRES_PASSWORD}@postgres:5432/villa_access
      JWT_SECRET:           ${JWT_SECRET}
      ANPR_WORKER_TOKEN:    ${ANPR_WORKER_TOKEN}
      NODE_ENV:             production
      LOG_LEVEL:            info
      # AI fallback after 3 OCR failures (opt-in, default OFF).
      # When ON, after 3 denied detections on the same camera within 10 min
      # the snapshots are sent to OpenAI gpt-4o-mini vision to re-read the
      # plate. Set AI_FALLBACK_ENABLED=true in .env.docker to enable.
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      AI_FALLBACK_ENABLED:  ${AI_FALLBACK_ENABLED:-false}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── React SPA (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── ANPR / OCR worker (Python + EasyOCR) ──────────────────────────────────
  # Polls cameras with ocr_enabled=true via the backend's /api/anpr endpoints.
  # No published ports — only talks to `backend` over the default compose
  # network. Snapshots are processed in memory and never written to disk.
  ai-worker:
    build:
      context: .
      dockerfile: docker/ai-worker/Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL:                  http://backend:8080
      ANPR_WORKER_TOKEN:             ${ANPR_WORKER_TOKEN}
      ANPR_LANGUAGES:                ${ANPR_LANGUAGES:-en}
      ANPR_REFRESH_TARGETS_SECONDS:  ${ANPR_REFRESH_TARGETS_SECONDS:-30}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
