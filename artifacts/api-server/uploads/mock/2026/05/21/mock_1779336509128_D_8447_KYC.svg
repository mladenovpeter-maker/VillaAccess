<circle cx="334" cy="328" r="14" fill="#2a2a2a" stroke="#3d3d3d" stroke-width="1"/>
<circle cx="334" cy="328" r="5" fill="#444"/>

<!-- Detection bounding box -->
<rect x="160" y="205" width="236" height="145" fill="none" stroke="#00e676" stroke-width="1.8" stroke-dasharray="7,5" opacity="0.8"/>
<!-- Corner accents -->
<polyline points="160,219 160,205 174,205" fill="none" stroke="#00e676" stroke-width="3"/>
<polyline points="382,205 396,205 396,219" fill="none" stroke="#00e676" stroke-width="3"/>
<polyline points="160,336 160,350 174,350" fill="none" stroke="#00e676" stroke-width="3"/>
<polyline points="382,350 396,350 396,336" fill="none" stroke="#00e676" stroke-width="3"/>
<!-- Plate highlight -->
<rect x="208" y="310" width="134" height="32" fill="#00e676" opacity="0.12" rx="3"/>
<rect x="208" y="310" width="134" height="32" fill="none" stroke="#00e676" stroke-width="1.5" rx="3"/>
<!-- Plate OCR label -->
<rect x="208" y="290" width="102" height="18" fill="#00e676" rx="3" opacity="0.92"/>
<text x="214" y="304" font-family="Courier New,monospace" font-size="11" fill="#000" font-weight="bold">D 8447 KYC</text>

<!-- Top bar -->
<rect width="640" height="52" fill="url(#topbar)"/>
<text x="11" y="22" font-family="Courier New,monospace" font-size="13" fill="white" font-weight="bold" opacity="0.95">CAM-V04-GATE</text>

<text x="629" y="22" font-family="Courier New,monospace" font-size="11" fill="white" text-anchor="end" opacity="0.85">2026-05-21 04:08:29</text>
<!-- REC blink -->
<circle cx="621" cy="38" r="5" fill="#f44336" opacity="0.9">
  <animate attributeName="opacity" values="0.9;0.25;0.9" dur="1.6s" repeatCount="indefinite"/>
</circle>
<text x="609" y="42" font-family="Courier New,monospace" font-size="11" fill="#f55" text-anchor="end" font-weight="bold">REC</text>

<!-- Bottom bar -->
<rect y="436" width="640" height="44" fill="url(#botbar)"/>
<rect x="10" y="455" width="162" height="7" rx="3" fill="#00e676" opacity="0.85"/>
<rect x="10" y="455" width="180" height="7" rx="3" fill="none" stroke="#444" stroke-width="1"/>
<text x="198" y="464" font-family="Courier New,monospace" font-size="11" fill="#00e676" font-weight="bold">90.1% OCR</text>
<text x="629" y="464" font-family="Courier New,monospace" font-size="11" fill="#00e676" text-anchor="end" font-weight="bold">▶ VEHICLE DETECTED</text>

<!-- MOCK watermark -->
<text x="320" y="248" font-family="Arial,sans-serif" font-size="60" fill="white" opacity="0.035" text-anchor="middle" font-weight="900" letter-spacing="8">MOCK</text>

