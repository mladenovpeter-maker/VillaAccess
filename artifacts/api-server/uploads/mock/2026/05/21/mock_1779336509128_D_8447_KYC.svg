<circle cx="222" cy="328" r="25" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="2"/>
<circle cx="222" cy="328" r="14" fill="#2a2a2a" stroke="#3d3d3d" stroke-width="1"/>
<circle cx="222" cy="328" r="5" fill="#444"/>
