<rect x="178" y="275" width="200" height="4" fill="#000" opacity="0.25"/>
<!-- Front lamp -->
<rect x="178" y="257" width="14" height="20" rx="3" fill="#fff9c4" opacity="0.85"/>
<rect x="178" y="257" width="6" height="20" rx="2" fill="#fff" opacity="0.5"/>
